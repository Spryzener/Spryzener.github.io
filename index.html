<style>
  :root{
    --bg: #120a24;
    --card: rgba(30, 16, 56, 0.72);
    --card-border: rgba(160, 110, 255, 0.35);
    --ink: #ece4ff;
    --ink-soft: #a894d6;
    --accent: #9b5cff;
    --accent-soft: #6a3fb8;
    --row-bg: rgba(60, 32, 110, 0.45);
    --row-bg-hover: rgba(80, 42, 150, 0.6);

    --status-color: #747f8d;
  }

  *{ box-sizing: border-box; }

  html, body{
    height: 100%;
    margin: 0;
  }

  body{
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    background-image: url('bg.gif');
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;

    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
  }

  .window{
    width: min(520px, 92vw);
    max-height: 86vh;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(90, 30, 180, 0.35);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 22px 22px 18px;
    flex-wrap: wrap;
  }

  .avatar{
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background-image: url('av.gif');
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-color: var(--accent-soft);

    flex-shrink: 0;
    cursor: pointer;
    border: 1px solid var(--card-border);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 20px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    overflow: hidden;
  }

  .avatar:hover{
    transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(155, 92, 255, 0.5);
  }

  .name-block{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .name-block h1{
    margin: 0;
    font-size: 18px;
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px;
  }

  .gothic-box{
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 16px;
    color: var(--ink);
    padding: 4px 10px;
    border-radius: 8px;
    border: 1px solid var(--card-border);
    background: rgba(10, 5, 24, 0.6);
    box-shadow: inset 0 0 6px rgba(155, 92, 255, 0.2);
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  .status-chip{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
    padding: 6px 12px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: rgba(10, 5, 24, 0.5);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--status-color);
    white-space: nowrap;
    transition: color 0.3s ease;
  }

  .status-chip .dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--status-color);
    box-shadow: 0 0 6px var(--status-color);
    animation: blink 1.4s infinite;
    transition: background 0.3s ease, box-shadow 0.3s ease;
  }

  @keyframes blink{
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }

  .links-wrapper{
    margin: 0 18px 20px;
    border: 1px solid var(--card-border);
    border-radius: 18px;
    background: rgba(15, 8, 32, 0.35);
    box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.25);
    overflow: hidden;
  }

  .links{
    max-height: 280px;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .links::-webkit-scrollbar{ width: 8px; }
  .links::-webkit-scrollbar-thumb{ background: var(--accent-soft); border-radius: 8px; }
  .links::-webkit-scrollbar-track{ background: transparent; }

  .link-row{
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--row-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 12px 16px;
    text-decoration: none;
    color: var(--ink);
    transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
  }

  .link-row:hover{
    background: var(--row-bg-hover);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .link-icon{
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: rgba(155, 92, 255, 0.2);
    border: 1px solid rgba(160, 110, 255, 0.25);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, box-shadow 0.2s ease;
  }

  .link-row:hover .link-icon{
    background: rgba(155, 92, 255, 0.4);
    box-shadow: 0 0 10px rgba(155, 92, 255, 0.4);
  }

  .link-icon svg {
    width: 20px;
    height: 20px;
    fill: var(--ink);
    transition: transform 0.2s ease, fill 0.2s ease;
  }

  .link-row:hover .link-icon svg {
    fill: #ffffff;
    transform: scale(1.1);
  }

  .link-text{
    font-size: 14px;
    font-weight: 500;
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 0.5px;
  }

  .overlay{
    position: fixed;
    inset: 0;
    background: rgba(8, 4, 20, 0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .overlay.show{ display: flex; }

  .modal{
    width: min(340px, 88vw);
    background: rgba(24, 12, 46, 0.92);
    border: 1px solid var(--card-border);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(90, 30, 180, 0.4);
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .modal h2{ margin: 0 0 6px; font-size: 17px; color: var(--ink); }
  .modal p{ margin: 0 0 16px; font-size: 13px; color: var(--ink-soft); }

  .modal input{
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--card-border);
    background: rgba(10, 5, 24, 0.6);
    color: var(--ink);
    font-size: 14px;
    text-align: center;
    letter-spacing: 2px;
    outline: none;
  }

  .modal input:focus{ border-color: var(--accent); }

  .modal input:focus::placeholder{
    color: transparent;
  }

  .modal-actions{ display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions button{
    flex: 1; padding: 9px 0; border-radius: 10px; border: none; font-size: 13px; cursor: pointer;
  }

  .btn-cancel{ background: transparent; border: 1px solid var(--card-border) !important; color: var(--ink-soft); }
  .btn-confirm{ background: var(--accent); color: #fff; }

  /* ---------- Панель управления (внутри модалки, после верного кода) ---------- */

  .panel-label{
    display: block;
    font-size: 12px;
    color: var(--ink-soft);
    margin: 12px 0 6px;
    text-align: left;
  }

  .modal input[type="text"],
  .modal input[type="color"]{
    text-align: left;
    letter-spacing: normal;
  }

  .modal input[type="color"]{ height: 38px; padding: 4px; cursor: pointer; }

  .checkbox-row{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    font-size: 13px;
    text-align: left;
    color: var(--ink);
  }

  .checkbox-row input{ width: auto; }

  .btn-download{
    width: 100%;
    margin-top: 14px;
    padding: 10px 0;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent-soft));
    color: #fff;
    font-size: 13px;
    cursor: pointer;
  }

  .panel-msg{
    margin-top: 10px;
    font-size: 12px;
    text-align: center;
    min-height: 14px;
  }

  .panel-msg.ok{ color: #7be08a; }
  .panel-msg.err{ color: #f04747; }

  /* ---------- Mobile ---------- */

  @media (max-width:560px){

    .header{
      gap:10px;
    }

    .gothic-box{
      order:2;
      margin-left:68px;
    }

    .status-chip{
      order:3;
      margin-left:68px;
      margin-top:-6px;
      width:auto;
    }

  }

  @media (max-width:420px){

    .header{
      padding:18px;
    }

    .name-block h1{
      font-size:16px;
    }

    .gothic-box{
      font-size:14px;
      margin-left:68px;
    }

    .status-chip{
      font-size:11px;
      padding:5px 10px;
      margin-left:68px;
    }

  }
</style>
</head>

        <div class="modal-actions">
          <button class="btn-cancel" id="cancelBtn">Отмена</button>
          <button class="btn-confirm" id="confirmBtn">Ок</button>
        </div>
      </div>

      <!-- ЭКРАН 2: панель управления (после верного кода) -->

        <h2>Панель управления</h2>

          <input type="checkbox" id="customActive">
          <label for="customActive">Кастомный статус (перекрывает Discord)</label>
        </div>

        <input type="text" id="statusTextInput" maxlength="30" placeholder="In Love">

        <input type="color" id="statusColorInput" value="#ff5ca8">

        <input type="text" id="gothicTextInput" maxlength="40" placeholder="Rvaniy Tuz">

        <div class="modal-actions">
          <button class="btn-cancel" id="closeBtn">Закрыть</button>
          <button class="btn-confirm" id="saveBtn">Сохранить</button>
        </div>

        <div class="panel-msg" id="panelMsg"></div>
      </div>

<script>
  const API_URL = 'https://passcode.dog945n.workers.dev';

  const overlay = document.getElementById('overlay');
  const avatarBtn = document.getElementById('avatarBtn');
  const cancelBtn = document.getElementById('cancelBtn');
  const confirmBtn = document.getElementById('confirmBtn');
  const codeInput = document.getElementById('codeInput');

  const codeView = document.getElementById('codeView');
  const panelView = document.getElementById('panelView');
  const closeBtn = document.getElementById('closeBtn');
  const saveBtn = document.getElementById('saveBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const panelMsg = document.getElementById('panelMsg');

  const gothicBox = document.getElementById('gothicBox');
  const statusText = document.getElementById('statusText');

  let unlockedCode = null;
  let downloadUrl = null;

  function resetModal() {
    codeView.style.display = 'block';
    panelView.style.display = 'none';
    codeInput.value = '';
    panelMsg.textContent = '';
  }

  avatarBtn.addEventListener('click', () => {
    overlay.classList.add('show');
    resetModal();
    codeInput.focus();
  });

  cancelBtn.addEventListener('click', () => overlay.classList.remove('show'));
  closeBtn.addEventListener('click', () => overlay.classList.remove('show'));

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) overlay.classList.remove('show');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && overlay.classList.contains('show')) {
      overlay.classList.remove('show');
    }
  });

  codeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') confirmBtn.click();
  });

  // ---- проверка кода: при успехе открываем панель вместо мгновенного редиректа ----
  confirmBtn.addEventListener('click', async () => {
    const code = codeInput.value.trim();
    if (!code) return;

    confirmBtn.disabled = true;
    confirmBtn.textContent = '...';

    try {
      const response = await fetch(API_URL + '/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code })
      });

      if (response.status === 401) {
        window.location.href = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        return;
      }

      if (response.status === 429) {
        alert('Слишком много попыток. Подожди немного.');
        return;
      }

      if (!response.ok) throw new Error('Server error');

      const data = await response.json();

      unlockedCode = code;
      downloadUrl = data.url;

      if (data.state) {
        document.getElementById('customActive').checked = !!data.state.customActive;
        document.getElementById('statusTextInput').value = data.state.statusText || '';
        document.getElementById('statusColorInput').value = data.state.statusColor || '#43b581';
        document.getElementById('gothicTextInput').value = data.state.gothicText || '';
      }

      codeView.style.display = 'none';
      panelView.style.display = 'block';

    } catch (err) {
      console.error('Ошибка связи с сервером:', err);
      alert('Ошибка при проверке кода. Попробуй позже.');
    } finally {
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Ок';
    }
  });

  // ---- сохранение изменений в панели ----
  saveBtn.addEventListener('click', async () => {
    if (!unlockedCode) return;

    const payload = {
      customActive: document.getElementById('customActive').checked,
      statusText: document.getElementById('statusTextInput').value.trim() || 'online',
      statusColor: document.getElementById('statusColorInput').value,
      gothicText: document.getElementById('gothicTextInput').value.trim() || 'Rvaniy Tuz'
    };

    saveBtn.disabled = true;
    saveBtn.textContent = '...';
    panelMsg.textContent = '';

    try {
      const res = await fetch(API_URL + '/admin-update', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + unlockedCode
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error('Server error');

      panelMsg.textContent = 'Сохранено';
      panelMsg.className = 'panel-msg ok';

      // применяем изменения сразу на странице
      if (payload.customActive) {
        statusText.textContent = payload.statusText;
        document.documentElement.style.setProperty('--status-color', payload.statusColor);
      }
      gothicBox.textContent = payload.gothicText;

    } catch {
      panelMsg.textContent = 'Ошибка сохранения';
      panelMsg.className = 'panel-msg err';
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Сохранить';
    }
  });

  // ---- отдельная кнопка скачивания ----
  downloadBtn.addEventListener('click', () => {
    if (downloadUrl) window.location.href = downloadUrl;
  });

  /* ============================================================
     📡 СТАТУС ЧЕРЕЗ /state (Discord ID скрыт на стороне Worker'а)
     ============================================================ */

  async function loadSiteState() {
    try {
      const res = await fetch(API_URL + '/state');
      if (!res.ok) return null;
      return await res.json();
    } catch {
      return null;
    }
  }

  async function refreshState() {
    const state = await loadSiteState();
    if (!state) return;

    if (state.gothicText) {
      gothicBox.textContent = state.gothicText;
    }

    statusText.textContent = state.statusText;
    document.documentElement.style.setProperty('--status-color', state.statusColor);
  }

  refreshState();
  setInterval(refreshState, 20000);
</script>

</body>
